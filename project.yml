name: FlyerBuddy
targets:
  FlyerBuddy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iosApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flyerbuddy.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: iosApp/Info.plist
    postBuildScripts:
      - name: Auto Commit and Push
        script: bash scripts/commit_and_push.sh

